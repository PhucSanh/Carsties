services:
  postgres:
    image: postgres:latest
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  mongodb:
    image: mongo:latest
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet","127.0.0.1/test","--eval", "quit(db.runCommand({ping: 1}).ok?0:2)"]
      interval: 5s
      timeout: 5s
      retries: 5
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
       test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
       interval: 5s
       timeout: 5s
       retries: 5
  
  auction-svc:
     image: trycatchlearn/auction-svc:latest
     build:
         context: .
         dockerfile: src/AuctionService/Dockerfile
     environment:
       - ASPNETCORE_ENVIRONMENT=Development
       - ASPNETCORE_URLS=http://+:80
       - RabbitMq__Host=${RABBITMQ_HOST}
       - RabbitMq__Username=${RABBITMQ_USERNAME}
       - RabbitMq__Password=${RABBITMQ_PASSWORD}
       - ConnectionStrings__DefaultConnection=Server=postgres:5432;User Id=postgres;Password=${DB_PASSWORD};Database=AuctionDB;
       - IdentityServerUrl=http://identity-svc
     ports:
        - "7001:80"
     depends_on:
          postgres:
            condition: service_healthy
          rabbitmq:
            condition: service_healthy
  search-svc:
        image: trycatchlearn/search-svc:latest
        build:
           context: .
           dockerfile: src/SearchService/Dockerfile
        environment:
         - ASPNETCORE_ENVIRONMENT=Development
         - ASPNETCORE_URLS=http://+:80
         - RabbitMq__Host=${RABBITMQ_HOST}
         - RabbitMq__Username=${RABBITMQ_USERNAME}
         - RabbitMq__Password=${RABBITMQ_PASSWORD}
         - ConnectionStrings__DefaultConnection=mongodb://root:mongopw@mongodb:27017/SearchService?authSource=admin
         - AuctionServiceUrl=http://auction-svc
        ports:
          - "7002:80"
        depends_on:
            mongodb:
              condition: service_healthy
            rabbitmq:
              condition: service_healthy
  identity-svc:
        image: trycatchlearn/identity-svc:latest
        build:
           context: .
           dockerfile: src/IdentityService/Dockerfile
        environment:
         - ASPNETCORE_ENVIRONMENT=Docker
         - ASPNETCORE_URLS=http://+:80
         - ConnectionStrings__DefaultConnection=Server=postgres:5432;User Id=postgres;Password=${DB_PASSWORD};Database=IdentityDB;
        ports:
          - "5001:80"
        depends_on:
            postgres:
              condition: service_healthy
  gate-way-svc:
        image: trycatchlearn/gateway-svc:latest
        build:
           context: .
           dockerfile: src/GatewayService/Dockerfile
        environment:
         - ASPNETCORE_ENVIRONMENT=Docker
         - ASPNETCORE_URLS=http://+:80
        ports:
          - "6001:80"
        depends_on: 
        - auction-svc
        - search-svc
    
        
volumes:
  pgdata:
  mongodata:
